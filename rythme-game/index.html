<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080810; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const GAME_WIDTH    = 400;
    const GAME_HEIGHT   = 600;
    const LANE_WIDTH    = GAME_WIDTH / 4;
    const RECEPTOR_Y    = 510;
    const ARROW_SIZE    = 56;
    const ARROW_SPEED   = 180;
    const HIT_WINDOW    = 450;
    const MISS_LIMIT    = 10;
    const HITS_PER_LIFE = 8;
    const GAME_DURATION = 120;
    const SECRET_LETTER = 'A';
    const GRACE_MS      = 1000;

    const TRAVEL_DISTANCE = RECEPTOR_Y + ARROW_SIZE;
    const TRAVEL_TIME_MS  = (TRAVEL_DISTANCE / ARROW_SPEED) * 1000;

    const LANES = [
      { key: 'ArrowLeft',  color: '#FF6B9D', label: '←', altKey: 'F' },
      { key: 'ArrowDown',  color: '#6BC5FF', label: '↓', altKey: 'G' },
      { key: 'ArrowUp',    color: '#A8FF6B', label: '↑', altKey: 'J' },
      { key: 'ArrowRight', color: '#FFD96B', label: '→', altKey: 'K' },
    ];

    const KEY_TO_LANE = {
      ArrowLeft: 0, ArrowDown: 1, ArrowUp: 2, ArrowRight: 3,
      f: 0, g: 1, j: 2, k: 3,
      F: 0, G: 1, J: 2, K: 3,
    };

    function ArrowSVG({ direction, color, size = 56, opacity = 1 }) {
      const paths = {
        ArrowLeft:  'M 42,10 L 14,28 L 42,46 L 42,38 L 26,28 L 42,18 Z',
        ArrowRight: 'M 14,10 L 42,28 L 14,46 L 14,38 L 30,28 L 14,18 Z',
        ArrowUp:    'M 10,42 L 28,14 L 46,42 L 38,42 L 28,26 L 18,42 Z',
        ArrowDown:  'M 10,14 L 28,42 L 46,14 L 38,14 L 28,30 L 18,14 Z',
      };
      return (
        <svg width={size} height={size} viewBox="0 0 56 56" style={{ opacity, display: 'block' }}>
          <path d={paths[direction]} fill={color} />
        </svg>
      );
    }

    function generateChart() {
      const BEAT   = 500;
      const EIGHTH = 250;
      const patterns = [
        [[0,0],[BEAT,1],[BEAT*2,2],[BEAT*3,3]],
        [[0,0],[BEAT,1],[BEAT+EIGHTH,2],[BEAT*2,3],[BEAT*3,0]],
        [[0,1],[BEAT,0],[BEAT*2,3],[BEAT*3,2]],
      ];
      const sequence = [
        0,0,2,0, 0,2,0,0,
        2,2,0,0, 2,2,0,0,
        1,0,0,2, 1,0,0,2,
        0,0,2,2, 0,0,2,2,
        1,1,0,0, 2,2,0,0,
        0,2,0,2, 0,2,0,2,
        1,1,1,1, 0,0,0,0,
        2,2,0,0,
        0,2,0,2,
      ];
      const PATTERN_DURATION = BEAT * 4;
      let id = 0;
      const notes = [];
      sequence.forEach((pi, si) => {
        const startMs = si * PATTERN_DURATION;
        patterns[pi].forEach(([offset, lane]) => {
          const hitTime = startMs + offset;
          if (hitTime < GAME_DURATION * 1000) notes.push({ id: id++, lane, hitTime });
        });
      });
      return notes.sort((a, b) => a.hitTime - b.hitTime);
    }

    const CHART = generateChart();
    const { useState, useEffect, useRef, useCallback } = React;

    function RhythmGame() {
      const [gameState,  setGameState]  = useState('idle');
      const [score,      setScore]      = useState(0);
      const [misses,     setMisses]     = useState(0);
      const [combo,      setCombo]      = useState(0);
      const [timeLeft,   setTimeLeft]   = useState(GAME_DURATION);
      const [feedback,   setFeedback]   = useState(null);
      const [activeKeys, setActiveKeys] = useState({});
      const [grace,      setGrace]      = useState(false);
      const [tick,       setTick]       = useState(0);

      const arrowsRef        = useRef([]);
      const nextNoteIdxRef   = useRef(0);
      const missesRef        = useRef(0);
      const scoreRef         = useRef(0);
      const comboRef         = useRef(0);
      const hitsForLifeRef   = useRef(0);
      const gameStartRef     = useRef(null);
      const rafRef           = useRef(null);
      const feedbackTimerRef = useRef(null);
      const activeRef        = useRef(false);

      const showFeedback = useCallback((text, lane) => {
        setFeedback({ text, lane });
        clearTimeout(feedbackTimerRef.current);
        feedbackTimerRef.current = setTimeout(() => setFeedback(null), 300);
      }, []);

      const gameLoop = useCallback(() => {
        if (!activeRef.current) return;

        const elapsed   = performance.now() - gameStartRef.current;
        const remaining = Math.min(GAME_DURATION, Math.max(0, GAME_DURATION - elapsed / 1000));
        setTimeLeft(Math.ceil(remaining));
        setGrace(elapsed < 0);

        if (elapsed >= GAME_DURATION * 1000) {
          activeRef.current = false;
          setGameState('win');
          return;
        }

        while (
          nextNoteIdxRef.current < CHART.length &&
          CHART[nextNoteIdxRef.current].hitTime - elapsed <= TRAVEL_TIME_MS
        ) {
          const note = CHART[nextNoteIdxRef.current++];
          arrowsRef.current.push({ ...note, status: 'active' });
        }

        let hitMissLimit = false;
        arrowsRef.current = arrowsRef.current.filter(arrow => {
          if (arrow.status !== 'active') return false;
          const timeToHit = arrow.hitTime - elapsed;
          arrow.y = RECEPTOR_Y - (timeToHit * ARROW_SPEED) / 1000;
          if (arrow.y > RECEPTOR_Y + ARROW_SIZE) {
            missesRef.current += 1;
            comboRef.current   = 0;
            hitsForLifeRef.current = 0;
            setMisses(missesRef.current);
            setCombo(0);
            showFeedback('MISS', arrow.lane);
            if (missesRef.current >= MISS_LIMIT) hitMissLimit = true;
            return false;
          }
          return arrow.y > -ARROW_SIZE - 10;
        });

        if (hitMissLimit) {
          activeRef.current = false;
          setGameState('gameover');
          return;
        }

        setTick(n => n + 1);
        rafRef.current = requestAnimationFrame(gameLoop);
      }, [showFeedback]);

      const startGame = useCallback(() => {
        cancelAnimationFrame(rafRef.current);
        arrowsRef.current      = [];
        nextNoteIdxRef.current = 0;
        missesRef.current      = 0;
        scoreRef.current       = 0;
        comboRef.current       = 0;
        hitsForLifeRef.current = 0;
        setScore(0);
        setMisses(0);
        setCombo(0);
        setFeedback(null);
        setActiveKeys({});
        setTimeLeft(GAME_DURATION);
        setGrace(true);
        gameStartRef.current = performance.now() + TRAVEL_TIME_MS + GRACE_MS;
        activeRef.current    = true;
        setGameState('playing');
        rafRef.current = requestAnimationFrame(gameLoop);
      }, [gameLoop]);

      useEffect(() => {
        if (gameState !== 'playing') return;

        const onKeyDown = (e) => {
          const lane = KEY_TO_LANE[e.key];
          if (lane === undefined) return;
          e.preventDefault();
          setActiveKeys(prev => ({ ...prev, [lane]: true }));

          const elapsed = performance.now() - gameStartRef.current;
          let best = null;
          let bestDiff = Infinity;
          for (const arrow of arrowsRef.current) {
            if (arrow.lane !== lane || arrow.status !== 'active') continue;
            const diff = Math.abs(arrow.hitTime - elapsed);
            if (diff < HIT_WINDOW && diff < bestDiff) { bestDiff = diff; best = arrow; }
          }

          if (best) {
            best.status = 'hit';
            comboRef.current       += 1;
            hitsForLifeRef.current += 1;
            scoreRef.current += 100 + Math.floor(comboRef.current / 5) * 50;
            setScore(scoreRef.current);
            setCombo(comboRef.current);

            if (hitsForLifeRef.current % HITS_PER_LIFE === 0 && missesRef.current > 0) {
              missesRef.current -= 1;
              setMisses(missesRef.current);
              showFeedback('+VIE !', lane);
            } else {
              let label = 'GOOD!';
              if (bestDiff < 80) label = 'PERFECT!';
              else if (bestDiff < 200) label = 'GREAT!';
              showFeedback(label, lane);
            }
          }
        };

        const onKeyUp = (e) => {
          const lane = KEY_TO_LANE[e.key];
          if (lane === undefined) return;
          setActiveKeys(prev => ({ ...prev, [lane]: false }));
        };

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup',   onKeyUp);
        return () => {
          window.removeEventListener('keydown', onKeyDown);
          window.removeEventListener('keyup',   onKeyUp);
        };
      }, [gameState, showFeedback]);

      useEffect(() => {
        return () => {
          cancelAnimationFrame(rafRef.current);
          clearTimeout(feedbackTimerRef.current);
        };
      }, []);

      const mins      = Math.floor(timeLeft / 60);
      const secs      = String(timeLeft % 60).padStart(2, '0');
      const danger    = timeLeft < 30;
      const livesLeft = MISS_LIMIT - misses;

      return (
        <div style={s.root}>
          <div style={s.game}>

            {/* HUD */}
            <div style={s.hud}>
              <span style={s.hudItem}>⭐ {score.toLocaleString()}</span>
              <span style={{ ...s.hudItem, color: danger ? '#ff5555' : '#fff', fontWeight: 'bold', fontSize: 18 }}>
                {mins}:{secs}
              </span>
              <span style={s.hudItem}>
                {'❤️'.repeat(Math.max(0, livesLeft))}{'🖤'.repeat(Math.max(0, misses))}
              </span>
            </div>

            {/* Combo */}
            {combo > 2 && gameState === 'playing' && !grace && (
              <div style={s.comboBanner}>{combo}× COMBO</div>
            )}

            {/* Lanes */}
            <div style={s.laneRow}>
              {LANES.map((_l, i) => (
                <div key={i} style={{ ...s.lane, borderRight: i < 3 ? '1px solid #1c1c30' : 'none' }} />
              ))}
            </div>

            {/* Hit line */}
            <div style={{ ...s.hitLine, top: RECEPTOR_Y }} />

            {/* Receptors */}
            {LANES.map((lane, i) => (
              <div
                key={i}
                style={{
                  ...s.receptor,
                  left:            i * LANE_WIDTH + (LANE_WIDTH - ARROW_SIZE) / 2,
                  top:             RECEPTOR_Y - ARROW_SIZE / 2,
                  borderColor:     lane.color,
                  backgroundColor: activeKeys[i] ? lane.color + '33' : 'transparent',
                  boxShadow:       activeKeys[i] ? `0 0 18px ${lane.color}` : 'none',
                }}
              >
                <ArrowSVG direction={lane.key} color={lane.color} size={ARROW_SIZE - 10} opacity={activeKeys[i] ? 1 : 0.35} />
              </div>
            ))}

            {/* Falling arrows */}
            {gameState === 'playing' && arrowsRef.current
              .filter(a => a.status === 'active' && a.y !== undefined)
              .map(arrow => (
                <div
                  key={arrow.id}
                  style={{
                    position:      'absolute',
                    left:          arrow.lane * LANE_WIDTH + (LANE_WIDTH - ARROW_SIZE) / 2,
                    top:           arrow.y - ARROW_SIZE / 2,
                    width:         ARROW_SIZE,
                    height:        ARROW_SIZE,
                    pointerEvents: 'none',
                    filter:        `drop-shadow(0 0 7px ${LANES[arrow.lane].color})`,
                    zIndex:        8,
                  }}
                >
                  <ArrowSVG direction={LANES[arrow.lane].key} color={LANES[arrow.lane].color} size={ARROW_SIZE} />
                </div>
              ))
            }

            {/* Feedback */}
            {feedback && (() => {
              const c = feedback.text === 'MISS'     ? '#ff5555'
                      : feedback.text === '+VIE !'   ? '#ff88ff'
                      : feedback.text === 'PERFECT!' ? '#FFD700'
                      : '#A8FF6B';
              return (
                <div style={{ ...s.feedback, left: feedback.lane * LANE_WIDTH + LANE_WIDTH / 2, color: c }}>
                  {feedback.text}
                </div>
              );
            })()}

            {/* Grace period */}
            {gameState === 'playing' && grace && (
              <div style={s.graceBanner}>PRÊT…</div>
            )}

            {/* Key legend (bottom-right) */}
            {gameState === 'playing' && (
              <div style={s.keyLegend}>
                <div style={s.keyRow}>
                  {LANES.map((lane, i) => (
                    <div key={i} style={{ ...s.keyCap, borderColor: lane.color, color: lane.color }}>
                      {lane.altKey}
                    </div>
                  ))}
                </div>
                <div style={s.keyRow}>
                  {LANES.map((lane, i) => (
                    <div key={i} style={{ ...s.keyCap, borderColor: lane.color, color: lane.color }}>
                      {lane.label}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Screen: idle */}
            {gameState === 'idle' && (
              <div style={s.overlay}>
                <h1 style={s.bigTitle}>RHYTHM RUSH</h1>
                <p style={s.sub}>Survivez 2 minutes pour révéler la lettre secrète !</p>
                <div style={s.keyHint}>
                  {LANES.map((l, i) => (
                    <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                      <ArrowSVG direction={l.key} color={l.color} size={34} />
                      <span style={{ color: l.color, fontSize: 11, fontFamily: 'monospace' }}>{l.altKey} / {l.label}</span>
                    </div>
                  ))}
                </div>
                <p style={{ color: '#ff7777', fontSize: 13, margin: 0 }}>
                  Plus de {MISS_LIMIT} ratés = Game Over · +1 vie tous les {HITS_PER_LIFE} hits
                </p>
                <button style={s.btn} onClick={startGame}>▶ JOUER</button>
              </div>
            )}

            {/* Screen: gameover */}
            {gameState === 'gameover' && (
              <div style={s.overlay}>
                <h2 style={{ color: '#ff5555', fontSize: 38, margin: 0, textShadow: '0 0 20px #ff5555' }}>GAME OVER</h2>
                <p style={{ color: '#ccc', fontSize: 18 }}>Score : {score.toLocaleString()}</p>
                <p style={{ color: '#888', fontSize: 14 }}>Trop de flèches ratées…</p>
                <button style={s.btn} onClick={startGame}>RECOMMENCER</button>
              </div>
            )}

            {/* Screen: win */}
            {gameState === 'win' && (
              <div style={s.overlay}>
                <h2 style={{ color: '#FFD700', fontSize: 38, margin: 0, textShadow: '0 0 20px #FFD700' }}>VICTOIRE !</h2>
                <p style={{ color: '#ccc', fontSize: 18 }}>Score : {score.toLocaleString()}</p>
                <p style={{ color: '#aaa', fontSize: 14 }}>Tu as survécu aux 2 minutes !</p>
                <div style={s.secretBox}>
                  <p style={{ color: '#aaa', fontSize: 13, margin: '0 0 8px' }}>Lettre secrète :</p>
                  <span style={s.secretLetter}>{SECRET_LETTER}</span>
                </div>
                <button style={{ ...s.btn, marginTop: 16 }} onClick={startGame}>REJOUER</button>
              </div>
            )}

          </div>
        </div>
      );
    }

    const s = {
      root: { display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '100vh', backgroundColor: '#080810', fontFamily: 'Segoe UI, monospace' },
      game: { position: 'relative', width: GAME_WIDTH, height: GAME_HEIGHT, background: 'linear-gradient(180deg, #0d0d1f 0%, #0a0a18 100%)', border: '2px solid #222', borderRadius: 10, overflow: 'hidden', boxShadow: '0 0 50px rgba(100,0,255,0.25)' },
      hud: { position: 'absolute', top: 0, left: 0, right: 0, display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 14px', backgroundColor: 'rgba(0,0,0,0.55)', zIndex: 20 },
      hudItem: { color: '#ddd', fontSize: 13 },
      comboBanner: { position: 'absolute', top: 36, left: '50%', transform: 'translateX(-50%)', color: '#FFD700', fontSize: 15, fontWeight: 'bold', textShadow: '0 0 10px #FFD700', zIndex: 15, whiteSpace: 'nowrap' },
      graceBanner: { position: 'absolute', top: '40%', left: '50%', transform: 'translate(-50%, -50%)', color: '#A855F7', fontSize: 32, fontWeight: 'bold', textShadow: '0 0 20px #A855F7', zIndex: 15, whiteSpace: 'nowrap', letterSpacing: 4 },
      laneRow: { position: 'absolute', inset: 0, display: 'flex' },
      lane: { flex: 1 },
      hitLine: { position: 'absolute', left: 0, right: 0, height: 2, backgroundColor: 'rgba(255,255,255,0.06)', zIndex: 5 },
      receptor: { position: 'absolute', width: ARROW_SIZE, height: ARROW_SIZE, border: '2px solid', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10, transition: 'box-shadow 0.05s, background-color 0.05s' },
      feedback: { position: 'absolute', top: RECEPTOR_Y - 90, transform: 'translateX(-50%)', fontSize: 15, fontWeight: 'bold', pointerEvents: 'none', zIndex: 25, textShadow: '0 0 8px currentColor', whiteSpace: 'nowrap', letterSpacing: 1 },
      keyLegend: { position: 'absolute', bottom: 14, right: 14, display: 'flex', flexDirection: 'column', gap: 4, zIndex: 15 },
      keyRow: { display: 'flex', gap: 6 },
      keyCap: { width: 26, height: 26, border: '2px solid', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 'bold', backgroundColor: 'rgba(0,0,0,0.6)' },
      overlay: { position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.88)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 100, gap: 14 },
      bigTitle: { color: '#A855F7', fontSize: 44, fontWeight: 'bold', margin: 0, textShadow: '0 0 25px #A855F7', letterSpacing: 5 },
      sub: { color: '#ccc', fontSize: 15, margin: 0, textAlign: 'center', padding: '0 20px' },
      keyHint: { display: 'flex', gap: 20, marginTop: 4 },
      btn: { marginTop: 8, padding: '12px 36px', fontSize: 18, fontWeight: 'bold', backgroundColor: '#7C3AED', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', letterSpacing: 2, boxShadow: '0 0 20px rgba(124,58,237,0.5)' },
      secretBox: { border: '2px solid #FFD700', borderRadius: 14, padding: '14px 36px', textAlign: 'center', boxShadow: '0 0 24px rgba(255,215,0,0.3)' },
      secretLetter: { color: '#FFD700', fontSize: 72, fontWeight: 'bold', textShadow: '0 0 24px #FFD700', display: 'block', lineHeight: 1 },
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RhythmGame />);
  </script>
</body>
</html>
